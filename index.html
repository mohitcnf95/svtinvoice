<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVT Tax Invoice</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#f5f5f5; }
.container { max-width: 190mm; margin:auto; background:white; padding:20px; }
.header { text-align:center; }
.logo { width:70px; }

input, textarea, select {
width:100%; border:none; font-size:12px;
}

table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td {
border:1px solid black; padding:6px; font-size:12px; text-align:center;
}
th { background:#f2f2f2; }

.summary { text-align:right; }
.footer {
display:flex; justify-content:space-between; margin-top:40px;
}

.hide { display:none; }
</style>
</head>

<body>

<div id="invoice" class="container">

<div class="header">
<h2>SIDDHI VINAYAK TRADERS</h2>
<p>Firozabad, UP</p>
<p>GSTIN: 09BFZPK4340C2Z7</p>
<h3>TAX INVOICE</h3>
</div>

<div>
Invoice No: <input id="invno"><br>
Date: <input type="date" id="today"><br>

Place of Supply:
<select id="pos" onchange="calc()">
<option value="01">Jammu & Kashmir (01)</option>
<option value="02">Himachal Pradesh (02)</option>
<option value="03">Punjab (03)</option>
<option value="04">Chandigarh (04)</option>
<option value="05">Uttarakhand (05)</option>
<option value="06">Haryana (06)</option>
<option value="07">Delhi (07)</option>
<option value="08">Rajasthan (08)</option>
<option value="09" selected>Uttar Pradesh (09)</option>
<option value="10">Bihar (10)</option>
<option value="11">Sikkim (11)</option>
<option value="12">Arunachal Pradesh (12)</option>
<option value="13">Nagaland (13)</option>
<option value="14">Manipur (14)</option>
<option value="15">Mizoram (15)</option>
<option value="16">Tripura (16)</option>
<option value="17">Meghalaya (17)</option>
<option value="18">Assam (18)</option>
<option value="19">West Bengal (19)</option>
<option value="20">Jharkhand (20)</option>
<option value="21">Odisha (21)</option>
<option value="22">Chhattisgarh (22)</option>
<option value="23">Madhya Pradesh (23)</option>
<option value="24">Gujarat (24)</option>
<option value="26">Dadra & Nagar Haveli (26)</option>
<option value="27">Maharashtra (27)</option>
<option value="28">Andhra Pradesh (28)</option>
<option value="29">Karnataka (29)</option>
<option value="30">Goa (30)</option>
<option value="31">Lakshadweep (31)</option>
<option value="32">Kerala (32)</option>
<option value="33">Tamil Nadu (33)</option>
<option value="34">Puducherry (34)</option>
<option value="35">Andaman & Nicobar (35)</option>
<option value="36">Telangana (36)</option>
<option value="37">Andhra Pradesh (37)</option>
<option value="38">Ladakh (38)</option>
</select>
</div>

<br>

<b>Bill To</b><br>
<input id="clientName" placeholder="Client Name">
<textarea id="clientAddress" placeholder="Address"></textarea>
<input id="clientGST" placeholder="GSTIN">

<br>

<table>
<thead>
<tr>
<th>Item</th><th>HSN</th><th>GST%</th><th>Qty</th><th>Rate</th><th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="addRow()">+ Add Item</button>

<div class="summary">
<p>Subtotal: ₹ <span id="sub">0</span></p>

<p id="cgstRow">CGST: ₹ <span id="cgst">0</span></p>
<p id="sgstRow">SGST: ₹ <span id="sgst">0</span></p>
<p id="igstRow">IGST: ₹ <span id="igst">0</span></p>

<p>Round Off: 
<select id="roundType" onchange="calc()">
<option value="none">None</option>
<option value="round">Round</option>
</select>
</p>

<p>Round Off Value: ₹ <span id="roundVal">0</span></p>

<h3>Grand Total: ₹ <span id="grand">0</span></h3>
</div>

<div class="footer">
<div>Receiver Signature<br>___________</div>
<div>Authorised Signatory</div>
</div>

</div>

<button onclick="preparePDF()">Download PDF</button>

<script>

document.getElementById("today").valueAsDate = new Date();

let invCount = localStorage.getItem("invCount") || 1;
invno.value = "SVT-INV-" + String(invCount).padStart(4,'0');

addRow();

function addRow(){
let tr=document.createElement("tr");
tr.innerHTML=`
<td><input></td>
<td><input></td>
<td><input value="18" oninput="calc()"></td>
<td><input type="number" oninput="calc()"></td>
<td><input type="number" oninput="calc()"></td>
<td class="total">0</td>`;
tbody.appendChild(tr);
}

function calc(){
let rows=document.querySelectorAll("#tbody tr");

let sub=0,cgst=0,sgst=0,igst=0;
let pos=posSelect();

rows.forEach(r=>{
let gst=r.cells[2].children[0].value||0;
let qty=r.cells[3].children[0].value||0;
let rate=r.cells[4].children[0].value||0;

let amt=qty*rate;
let gstVal=amt*gst/100;

r.cells[5].innerText=(amt+gstVal).toFixed(2);

sub+=amt;

if(pos==="09"){
cgst+=gstVal/2;
sgst+=gstVal/2;
}else{
igst+=gstVal;
}
});

let total=sub+cgst+sgst+igst;

let roundVal=0;
if(roundType.value==="round"){
let r=Math.round(total);
roundVal=r-total;
total=r;
}

// show/hide
if(pos==="09"){
cgstRow.style.display="block";
sgstRow.style.display="block";
igstRow.style.display="none";
}else{
cgstRow.style.display="none";
sgstRow.style.display="none";
igstRow.style.display="block";
}

sub=sub.toFixed(2);

cgstEl(cgst);
sgstEl(sgst);
igstEl(igst);

roundValEl(roundVal);
grand.innerText=total.toFixed(2);
subEl(sub);
}

function posSelect(){
return document.getElementById("pos").value;
}

function subEl(v){ sub.innerText=v; }
function cgstEl(v){ cgst.innerText=v.toFixed(2); }
function sgstEl(v){ sgst.innerText=v.toFixed(2); }
function igstEl(v){ igst.innerText=v.toFixed(2); }
function roundValEl(v){ roundVal.innerText=v.toFixed(2); }

function preparePDF(){

let client=clientName.value || "Client";
let inv=invno.value;

client=client.replace(/[^a-z0-9]/gi,'_');

let filename=client+"_"+inv+".pdf";

html2pdf().from(invoice).save(filename);

localStorage.setItem("invCount", parseInt(invCount)+1);
}

</script>

</body>
</html>
